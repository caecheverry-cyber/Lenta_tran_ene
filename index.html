<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; background: white; }
        #grafico { width: 100%; height: 550px; }
    </style>
</head>
<body>
<div id="grafico"></div>
<script>
    const years = [1970,1975,1980,1985,1990,1995,2000,2005,2010,2015,2020,2021,2022,2023,2024];
    const total = [15.5,18.2,21.9,24.0,27.1,29.3,32.5,36.7,39.4,41.3,40.1,41.4,42.4,42.8,43.4];
    const power = [5.2,6.4,7.8,8.5,9.4,10.1,11.2,13.2,14.5,15.1,14.8,15.2,15.6,15.8,16.0];
    const industry = [2.8,3.2,3.9,4.2,4.8,5.2,5.9,6.8,7.5,8.0,7.9,8.2,8.4,8.5,8.6];
    const transport = [2.2,2.7,3.4,3.9,4.6,5.1,5.9,6.5,6.9,7.3,6.8,7.2,7.5,7.7,7.9];
    const buildings = [1.9,2.1,2.4,2.6,2.9,3.1,3.3,3.5,3.6,3.7,3.5,3.6,3.6,3.6,3.6];
    const fuel_exploitation = [1.2,1.4,1.7,1.9,2.2,2.4,2.6,2.9,2.9,3.0,2.9,3.0,3.1,3.0,3.1];

    const layout = {
        title: { text: '⏳ La lentitud de las transiciones energéticas (1970-2024)', font: { size: 13 } },
        xaxis: { title: { text: 'Año', font: { size: 12 } }, tickvals: [1970,1980,1990,2000,2010,2020,2024] },
        yaxis: { title: { text: 'Emisiones de GEI (Gt CO₂e)', font: { size: 12 } }, range: [0,50] },
        hovermode: 'x unified',
        legend: { 
            orientation: 'h', 
            y: 1.05,           // baja un poco la leyenda
            x: 0, 
            xanchor: 'left', 
            font: { size: 9 }, // reduce el tamaño de la fuente de la leyenda
            bgcolor: 'rgba(255,255,255,0.8)' // fondo semitransparente para legibilidad
        },
        margin: { t: 70, l: 55, r: 30, b: 40 }  // más espacio superior para la leyenda
    };

    Plotly.newPlot('grafico', [
        {x: years, y: total, name: '🌍 Total global', mode: 'lines+markers', line: {color: '#000', width: 3}},
        {x: years, y: power, name: '⚡ Sector eléctrico', line: {color: '#e31a23', width: 2}},
        {x: years, y: industry, name: '🏭 Industria', line: {color: '#ff7f00', width: 2}},
        {x: years, y: transport, name: '🚗 Transporte', line: {color: '#1f78b4', width: 2}},
        {x: years, y: buildings, name: '🏢 Edificios', line: {color: '#33a02c', width: 2}},
        {x: years, y: fuel_exploitation, name: '⛽ Extracción combustibles', line: {color: '#6a3d9a', width: 2}}
    ], layout, {responsive: true});
</script>
</body>
</html>
